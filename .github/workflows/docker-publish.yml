name: 构建并发布 Docker 镜像到 GHCR

on:
  push:
    branches:
      - main
      - alpha
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 读取版本号
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(tr -d '\n\r ' < VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "读取到版本号: $VERSION"

      - name: 检查 VERSION 是否在本次 push 中变更
        id: version_changed
        shell: bash
        run: |
          set -euo pipefail
          CHANGED=false
          BEFORE_SHA="${{ github.event.before }}"

          if [ "${{ github.event_name }}" = "push" ] && \
             [ -n "$BEFORE_SHA" ] && \
             [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            if git diff --name-only "$BEFORE_SHA" "${{ github.sha }}" | grep -qx 'VERSION'; then
              CHANGED=true
            fi
          fi

          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "VERSION 是否变更: $CHANGED"

      - name: 检查 Git Tag 是否已存在
        id: check_tag
        if: github.ref_name == 'main' && steps.version_changed.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} 已存在"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} 不存在，将创建新 tag"
          fi

      - name: 创建 Git Tag
        if: github.ref_name == 'main' && steps.version_changed.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          echo "已创建并推送 tag: v${{ steps.version.outputs.version }}"

      - name: 生成镜像名和标签
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          REF_NAME="${{ github.ref_name }}"
          OWNER_LC=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(printf '%s' "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/$OWNER_LC/$REPO_NAME"
          SHORT_SHA=$(printf '%s' "${{ github.sha }}" | cut -c1-7)
          TAGS="$IMAGE:sha-$SHORT_SHA"

          if [ "$REF_NAME" = "main" ]; then
            TAGS="$IMAGE:latest"$'\n'"$TAGS"

            if [ "${{ steps.version_changed.outputs.changed }}" = "true" ]; then
              TAGS="$TAGS"$'\n'"$IMAGE:${{ steps.version.outputs.version }}"
            fi
          elif [ "$REF_NAME" = "alpha" ]; then
            TAGS="$IMAGE:alpha"$'\n'"$IMAGE:alpha-sha-$SHORT_SHA"
          fi

          {
            echo "image=$IMAGE"
            echo "tags<<EOF"
            printf '%s\n' "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "镜像仓库: $IMAGE"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 生成构建摘要
        shell: bash
        run: |
          {
            echo "## Docker 镜像构建成功"
            echo ""
            echo "- Git 仓库: \`${{ github.repository }}\`"
            echo "- GHCR 仓库: \`${{ steps.prep.outputs.image }}\`"
            echo "- 当前版本: \`${{ steps.version.outputs.version }}\`"
            echo "- VERSION 是否变更: \`${{ steps.version_changed.outputs.changed }}\`"
            echo ""
            echo "### 已推送标签"
            echo '```text'
            printf '%s\n' "${{ steps.prep.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
